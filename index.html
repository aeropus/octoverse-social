        :root { 
            --primary: #075e54; 
            --bg: #f0f2f5; 
            --white: #ffffff; 
            --text-main: 'Inter', 'Noto Color Emoji', sans-serif; 
            --text-heading: 'VilloChat Serif', 'Noto Color Emoji', serif;
            --text-msg: 'VilloChat Sans', 'Noto Color Emoji', sans-serif;
            --msg-font-size: 15px;
            --my-bubble-color: #dcf8c6;
            --bubble-radius: 12px;
            --sidebar-width: 350px;
        }

/* ── ROOT VARIABLES (mirrors VilloChat) ── */
:root {
  --primary: #075e54;
  --bg: #f0f2f5;
  --white: #ffffff;
  --text-color: #111b21;
  --text-secondary: #54656f;
  --border-color: #e9edef;
  --input-bg: #ffffff;
  --bubble-sent: #d9fdd3;
  --hover-bg: rgba(0,0,0,.04);
  --accent: #128c7e;
  --font: 'Inter','VilloChat Sans','Noto Color Emoji',sans-serif;
  --sidebar-width: 340px;
}
body.dark-mode {
  --primary: #00a884;
  --bg: #0b141a;
  --white: #1f2c33;
  --text-color: #e9edef;
  --text-secondary: #8696a0;
  --border-color: #2a3942;
  --input-bg: #2a3942;
  --bubble-sent: #005c4b;
  --hover-bg: rgba(255,255,255,.04);
  --accent: #00a884;
}

/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text-color);min-height:100vh;font-size:15px;}
button{cursor:pointer;font-family:var(--font);}
input,textarea{font-family:var(--font);}
a{text-decoration:none;color:inherit;}
svg{flex-shrink:0;}

/* ── LOGIN ── */
#login-screen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;background:var(--bg);
}
.login-card{
  width:100%;max-width:420px;padding:40px 36px;
  background:var(--white);border-radius:16px;
  box-shadow:0 4px 24px rgba(0,0,0,.08);
}
.login-logo{
  display:flex;align-items:center;justify-content:center;gap:12px;
  margin-bottom:24px;
}
.login-logo span{font-size:26px;font-weight:800;color:var(--primary);}
.login-title{font-size:22px;font-weight:700;text-align:center;margin-bottom:4px;}
.login-sub{font-size:14px;color:var(--text-secondary);text-align:center;margin-bottom:28px;}
.login-input{
  width:100%;padding:12px 14px;border:1px solid var(--border-color);
  border-radius:10px;background:var(--input-bg);color:var(--text-color);
  font-size:15px;outline:none;margin-bottom:10px;transition:border-color .2s;
}
.login-input:focus{border-color:var(--primary);}
.login-hint{font-size:12px;color:var(--text-secondary);margin-bottom:6px;}
.login-btn{
  width:100%;padding:13px;border:none;border-radius:10px;
  background:var(--primary);color:#fff;font-size:15px;font-weight:700;
  transition:opacity .2s;margin-top:4px;
}
.login-btn:hover{opacity:.88;}
.login-note{font-size:13px;color:var(--text-secondary);text-align:center;margin-top:14px;}

/* ── APP LAYOUT ── */
#app{display:flex;min-height:100vh;max-width:1300px;margin:0 auto;}

/* ── SIDEBAR ── */
#sidebar{
  width:var(--sidebar-width);flex-shrink:0;
  background:var(--white);border-right:1px solid var(--border-color);
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;
  overflow:hidden;
}
.sidebar-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid var(--border-color);background:var(--white);
}
.sidebar-brand{display:flex;align-items:center;gap:10px;}
.sidebar-brand-icon{color:var(--primary);}
.sidebar-brand-name{font-size:18px;font-weight:800;color:var(--primary);letter-spacing:-.3px;}
.sidebar-actions{display:flex;gap:4px;}
.icon-btn{
  background:none;border:none;padding:8px;border-radius:50%;
  color:var(--text-secondary);display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.icon-btn:hover{background:var(--hover-bg);}
.sidebar-search{padding:8px 12px;border-bottom:1px solid var(--border-color);}
.search-input-wrap{
  display:flex;align-items:center;gap:8px;
  background:var(--bg);border-radius:8px;padding:8px 12px;
}
.search-input-wrap input{
  flex:1;background:none;border:none;outline:none;
  color:var(--text-color);font-size:14px;
}
.search-input-wrap input::placeholder{color:var(--text-secondary);}
.sidebar-nav{display:flex;flex-direction:column;flex:1;overflow-y:auto;padding:4px 8px;}
.nav-item{
  display:flex;align-items:center;gap:14px;padding:11px 12px;
  border-radius:10px;color:var(--text-color);font-size:15px;
  transition:background .15s;cursor:pointer;
}
.nav-item:hover{background:var(--hover-bg);}
.nav-item.active{background:rgba(7,94,84,.08);color:var(--primary);font-weight:600;}
.nav-item.active svg{color:var(--primary);}
.nav-icon{color:var(--text-secondary);display:flex;align-items:center;}
.nav-item.active .nav-icon{color:var(--primary);}
.sidebar-compose-btn{
  margin:12px;padding:13px;background:var(--primary);color:#fff;
  border:none;border-radius:10px;font-size:15px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:opacity .2s;
}
.sidebar-compose-btn:hover{opacity:.88;}
.sidebar-user{
  display:flex;align-items:center;gap:10px;padding:12px 16px;
  border-top:1px solid var(--border-color);cursor:pointer;
  transition:background .15s;
}
.sidebar-user:hover{background:var(--hover-bg);}
.sidebar-user-info{flex:1;min-width:0;}
.sidebar-user-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sidebar-user-handle{font-size:12px;color:var(--text-secondary);}

/* ── AVATAR ── */
.av{
  border-radius:50%;overflow:hidden;display:flex;align-items:center;
  justify-content:center;font-weight:700;color:#fff;flex-shrink:0;
}
.av img{width:100%;height:100%;object-fit:cover;}

/* ── MAIN ── */
#main{flex:1;min-width:0;background:var(--white);border-right:1px solid var(--border-color);}

/* ── PAGE HEADER ── */
.page-header{
  position:sticky;top:0;z-index:20;
  background:rgba(255,255,255,.9);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border-color);
}
body.dark-mode .page-header{background:rgba(31,44,51,.9);}
.page-header-inner{
  display:flex;align-items:center;gap:10px;padding:12px 16px;min-height:56px;
}
.page-header-title{font-size:18px;font-weight:800;flex:1;}
.tab-bar{display:flex;border-bottom:1px solid var(--border-color);}
.tab{
  flex:1;text-align:center;padding:14px 8px;font-size:14px;font-weight:500;
  color:var(--text-secondary);cursor:pointer;position:relative;transition:color .15s;
}
.tab:hover{color:var(--text-color);background:var(--hover-bg);}
.tab.active{color:var(--primary);font-weight:700;}
.tab.active::after{
  content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:48px;height:3px;background:var(--primary);border-radius:2px;
}

/* ── COMPOSE BOX ── */
.compose-box{
  display:flex;gap:12px;padding:12px 16px;
  border-bottom:1px solid var(--border-color);
}
.compose-area{flex:1;min-width:0;}
.compose-textarea{
  width:100%;background:transparent;border:none;outline:none;
  color:var(--text-color);font-size:18px;resize:none;
  min-height:50px;max-height:260px;line-height:1.4;
}
.compose-textarea::placeholder{color:var(--text-secondary);}
.compose-toolbar{
  display:flex;align-items:center;padding-top:10px;
  border-top:1px solid var(--border-color);margin-top:6px;gap:4px;
}
.compose-actions{display:flex;gap:2px;flex:1;}
.compose-action{
  background:none;border:none;padding:7px;border-radius:50%;
  color:var(--primary);display:flex;align-items:center;
  transition:background .15s;
}
.compose-action:hover{background:rgba(7,94,84,.08);}
.compose-submit{
  background:var(--primary);color:#fff;border:none;
  border-radius:9999px;padding:8px 20px;font-size:14px;font-weight:700;
  transition:opacity .2s;
}
.compose-submit:hover{opacity:.88;}
.compose-submit:disabled{opacity:.45;cursor:default;}
.compose-char{font-size:12px;color:var(--text-secondary);align-self:center;margin-right:8px;}
.compose-char.warn{color:#e67e22;}
.compose-char.over{color:#e74c3c;}
.compose-img-preview{margin-top:8px;position:relative;display:inline-block;}
.compose-img-preview img{max-width:100%;max-height:220px;border-radius:12px;border:1px solid var(--border-color);}
.compose-img-remove{
  position:absolute;top:6px;right:6px;background:rgba(0,0,0,.55);
  border:none;color:#fff;border-radius:50%;width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;
}

/* ── POST CARD ── */
.post{
  display:flex;gap:12px;padding:12px 16px;
  border-bottom:1px solid var(--border-color);cursor:pointer;
  transition:background .12s;
}
.post:hover{background:var(--hover-bg);}
.post-body{flex:1;min-width:0;}
.post-header{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:2px;}
.post-name{font-weight:700;font-size:14px;}
.post-handle,.post-time{color:var(--text-secondary);font-size:13px;}
.post-text{font-size:15px;line-height:1.5;white-space:pre-wrap;word-break:break-word;margin-top:2px;}
.post-image{margin-top:10px;border-radius:12px;overflow:hidden;border:1px solid var(--border-color);}
.post-image img{width:100%;max-height:400px;object-fit:cover;display:block;}
.post-actions{display:flex;align-items:center;margin-top:10px;gap:2px;}
.post-action{
  display:flex;align-items:center;gap:5px;padding:5px 8px;
  border-radius:9999px;border:none;background:none;
  color:var(--text-secondary);font-size:12px;font-family:var(--font);
  transition:color .15s,background .15s;
}
.post-action:hover.like{color:#e74c3c;background:rgba(231,76,60,.08);}
.post-action:hover.comment{color:var(--primary);background:rgba(7,94,84,.08);}
.post-action:hover.share-vc{color:#25d366;background:rgba(37,211,102,.08);}
.post-action.liked{color:#e74c3c;}
.delete-post-btn{
  margin-left:auto;background:none;border:none;padding:5px 8px;
  color:var(--text-secondary);border-radius:9999px;
  transition:color .15s,background .15s;
}
.delete-post-btn:hover{color:#e74c3c;background:rgba(231,76,60,.08);}

/* ── COMMENTS ── */
.comment{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border-color);}
.comment:last-child{border-bottom:none;}
.comment-body{flex:1;}
.comment-header{font-size:13px;color:var(--text-secondary);margin-bottom:2px;}
.comment-header strong{color:var(--text-color);font-size:14px;}
.comment-text{font-size:14px;line-height:1.4;}
.comment-input-row{display:flex;gap:10px;align-items:flex-start;padding:10px 0;}
.comment-input{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text-color);font-size:15px;resize:none;line-height:1.4;
  border-bottom:1px solid var(--border-color);padding-bottom:4px;
}
.comment-input::placeholder{color:var(--text-secondary);}
.comment-send{
  background:var(--primary);color:#fff;border:none;
  border-radius:9999px;padding:6px 16px;font-size:13px;font-weight:700;
}
.comment-send:disabled{opacity:.45;cursor:default;}

/* ── WIDGETS PANEL ── */
#widgets{width:320px;flex-shrink:0;padding:16px;}
.widget-search{position:sticky;top:0;padding-bottom:12px;background:var(--bg);z-index:5;}
body.dark-mode .widget-search{background:var(--bg);}
.widget-card{
  background:var(--white);border-radius:12px;padding:16px;
  margin-bottom:16px;border:1px solid var(--border-color);
}
.widget-title{font-size:18px;font-weight:800;margin-bottom:12px;}
.villochat-btn{
  display:flex;align-items:center;gap:10px;background:var(--primary);
  color:#fff;border:none;border-radius:10px;padding:11px 18px;
  font-size:14px;font-weight:700;width:100%;transition:opacity .2s;
}
.villochat-btn:hover{opacity:.88;}
.trend-item{padding:10px 0;border-bottom:1px solid var(--border-color);}
.trend-item:last-child{border-bottom:none;}
.trend-category{font-size:12px;color:var(--text-secondary);}
.trend-name{font-size:15px;font-weight:700;}
.trend-count{font-size:12px;color:var(--text-secondary);}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(11,20,26,.7);
  z-index:1000;display:flex;align-items:flex-start;
  justify-content:center;padding:60px 16px;overflow-y:auto;
}
.modal-box{
  background:var(--white);border-radius:16px;width:100%;max-width:600px;
  position:relative;
}
.modal-header{
  display:flex;align-items:center;gap:12px;padding:12px 16px;
  border-bottom:1px solid var(--border-color);
}
.modal-close{
  background:none;border:none;color:var(--text-color);
  border-radius:50%;padding:6px;display:flex;align-items:center;
  transition:background .15s;
}
.modal-close:hover{background:var(--hover-bg);}
.modal-title{font-size:18px;font-weight:700;}

/* ── PROFILE ── */
.profile-banner{height:150px;background:linear-gradient(135deg,var(--primary) 0%,#1a9c8a 100%);}
.profile-info{padding:14px 16px;}
.profile-av-wrap{
  width:72px;height:72px;border-radius:50%;border:4px solid var(--white);
  overflow:hidden;display:flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:700;color:#fff;margin-top:-36px;margin-bottom:10px;
}
.profile-av-wrap img{width:100%;height:100%;object-fit:cover;}
.profile-name{font-size:20px;font-weight:800;}
.profile-handle{font-size:14px;color:var(--text-secondary);margin-top:2px;}
.profile-stats{display:flex;gap:16px;font-size:13px;margin-top:10px;}
.profile-stat span{color:var(--text-secondary);}

/* ── LOADING / EMPTY ── */
.spinner-wrap{display:flex;align-items:center;justify-content:center;padding:40px;gap:10px;color:var(--text-secondary);}
.spinner{width:22px;height:22px;border:3px solid var(--border-color);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty-state{text-align:center;padding:48px 24px;color:var(--text-secondary);}
.empty-state h3{font-size:22px;font-weight:800;color:var(--text-color);margin-bottom:6px;}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--primary);color:#fff;padding:11px 22px;
  border-radius:9999px;font-size:14px;font-weight:600;
  z-index:9999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;white-space:nowrap;
}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast.error{background:#e74c3c;}

/* ── MOBILE BOTTOM NAV ── */
#mobile-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:var(--white);border-top:1px solid var(--border-color);
  z-index:100;padding:4px 0;
}
.mobile-nav-inner{display:flex;}
.mobile-nav-btn{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:10px;background:none;border:none;color:var(--text-secondary);
  transition:color .15s;
}
.mobile-nav-btn.active{color:var(--primary);}

/* ── RESPONSIVE ── */
@media(max-width:1100px){#widgets{display:none;}}
@media(max-width:720px){
  #sidebar{display:none;}
  #mobile-nav{display:flex;}
  #main{padding-bottom:60px;border-right:none;}
}
@media(min-width:720px) and (max-width:900px){
  #sidebar{width:72px;}
  .nav-item span.nav-label,.sidebar-brand-name,.sidebar-user-info,.sidebar-compose-btn span{display:none;}
  .nav-item{justify-content:center;}
  .sidebar-compose-btn{padding:13px;justify-content:center;}
}

/* ── AUTH TABS ── */
#tab-login, #tab-register { transition: color .2s, border-color .2s; }
#tab-login:hover, #tab-register:hover { color: var(--text-color) !important; }
#reg-user-status.ok   { color: #27ae60; }
#reg-user-status.err  { color: #e74c3c; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <span style="color:var(--primary)"><svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" ><path d="M12 2a6 6 0 0 1 6 6c0 .6-.1 1.2-.2 1.8C19.3 10.6 21 12.2 21 14c0 2-1.8 3.5-4 3.5-.3 0-.6 0-.9-.1l-.3 1.9c-.2 1.4-1.4 2.4-2.8 2.7V22h-2v-.1C9.6 21.6 8.4 20.6 8.2 19.3l-.3-1.9c-.3.1-.6.1-.9.1C4.8 17.5 3 16 3 14c0-1.8 1.7-3.4 3.2-4.2C6.1 9.2 6 8.6 6 8a6 6 0 0 1 6-6z"/></svg></span>
      <span>Octoverse</span>
    </div>
    <!-- Tab bar -->
    <div style="display:flex;border-bottom:1px solid var(--border-color);margin-bottom:20px;">
      <button id="tab-login" onclick="switchAuthTab('login')"
        style="flex:1;padding:10px;background:none;border:none;font-size:15px;font-weight:700;cursor:pointer;color:var(--primary);border-bottom:3px solid var(--primary);font-family:var(--font);">
        Anmelden
      </button>
      <button id="tab-register" onclick="switchAuthTab('register')"
        style="flex:1;padding:10px;background:none;border:none;font-size:15px;font-weight:500;cursor:pointer;color:var(--text-secondary);border-bottom:3px solid transparent;font-family:var(--font);">
        Registrieren
      </button>
    </div>
    <!-- LOGIN FORM -->
    <div id="form-login">
      <input class="login-input" id="login-user" type="text" placeholder="Nutzername" autocomplete="username">
      <input class="login-input" id="login-pin" type="password" placeholder="PIN (xxxx-xxxx)" maxlength="9" autocomplete="current-password">
      <div class="login-hint" id="login-hint" style="display:none"></div>
      <button class="login-btn" id="login-btn" onclick="doLogin()">Anmelden</button>
    </div>
    <!-- REGISTER FORM -->
    <div id="form-register" style="display:none">
      <input class="login-input" id="reg-user" type="text" placeholder="Nutzername wählen" autocomplete="username"
        oninput="checkUsernameAvail(this.value)">
      <div id="reg-user-status" style="font-size:12px;margin:-6px 0 8px;min-height:16px;"></div>
      <input class="login-input" id="reg-pin" type="password" placeholder="PIN wählen (xxxx-xxxx)" maxlength="9" autocomplete="new-password">
      <input class="login-input" id="reg-pin2" type="password" placeholder="PIN wiederholen" maxlength="9" autocomplete="new-password">
      <input class="login-input" id="reg-hint" type="text" placeholder="PIN-Hinweis (optional, sichtbar beim Login)" maxlength="80">
      <div id="reg-error" style="font-size:13px;color:#e74c3c;min-height:18px;margin-bottom:4px;"></div>
      <button class="login-btn" id="reg-btn" onclick="doRegister()">Konto erstellen</button>
      <p class="login-note">Der Account funktioniert auch direkt in <strong>VilloChat</strong>.</p>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

  <!-- SIDEBAR -->
  <nav id="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-brand">
        <span class="sidebar-brand-icon"><svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" ><path d="M12 2a6 6 0 0 1 6 6c0 .6-.1 1.2-.2 1.8C19.3 10.6 21 12.2 21 14c0 2-1.8 3.5-4 3.5-.3 0-.6 0-.9-.1l-.3 1.9c-.2 1.4-1.4 2.4-2.8 2.7V22h-2v-.1C9.6 21.6 8.4 20.6 8.2 19.3l-.3-1.9c-.3.1-.6.1-.9.1C4.8 17.5 3 16 3 14c0-1.8 1.7-3.4 3.2-4.2C6.1 9.2 6 8.6 6 8a6 6 0 0 1 6-6z"/></svg></span>
        <span class="sidebar-brand-name">Octoverse</span>
      </div>
      <div class="sidebar-actions">
        <button class="icon-btn" onclick="toggleDark()" title="Design wechseln"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" ><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></button>
      </div>
    </div>
    <div class="sidebar-search">
      <div class="search-input-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" ><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" placeholder="Suchen…" id="sidebar-search" oninput="doSearch(this.value)">
      </div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-item active" id="nav-home" onclick="showFeed();setNav('home')">
        <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" ><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
        <span class="nav-label">Start</span>
      </div>

        <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" ><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
        <span class="nav-label">Erkunden</span>
      </div>
      <div class="nav-item" id="nav-profile" onclick="showProfile();setNav('profile')">
        <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" ><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
        <span class="nav-label">Profil</span>
      </div>
      <div class="nav-item" onclick="openVilloChat()">
        <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" ><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg></span>
        <span class="nav-label">VilloChat</span>
      </div>
    </div>
    <button class="sidebar-compose-btn" onclick="openComposeModal()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" ><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg><span>Posten</span>
    </button>
    <div class="sidebar-user" onclick="showProfile();setNav('profile')">
      <div class="av" id="sidebar-av" style="width:38px;height:38px;font-size:15px;"></div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name" id="sidebar-name"></div>
        <div class="sidebar-user-handle" id="sidebar-handle"></div>
      </div>
    </div>

<script type="module">

  getDatabase, ref, set, get, push, onValue, off, remove
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB3wZU09SzNh7xZFPFjPHR9nhDCWkGzj7E",
  authDomain: "villochat.firebaseapp.com",

  storageBucket: "villochat.firebasedata.app",
  messagingSenderId: "257561919332",
  appId: "1:257561919332:web:712d942c2f2e07169e8471"
};
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getDatabase(app);

// ── STATE ─────────────────────────────────────────────────────────────────
let myUsername    = "";
let myAvatar      = null;
let composeImg    = null;
let modalImg      = null;
let currentPostId = null;
let currentSharePost = null;
let feedListener  = null;
let allPosts      = [];
const MAX_CHARS   = 500;
const MAX_BYTES   = 1024 * 1024;
const avatarCache = {};

// ── HELPERS ───────────────────────────────────────────────────────────────
const escHtml = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const timeAgo = ts => {
  const d = Date.now() - ts;
  if (d < 60000)   return "jetzt";
  if (d < 3600000) return Math.floor(d/60000) + " Min.";
  if (d < 86400000)return Math.floor(d/3600000) + " Std.";
  return Math.floor(d/86400000) + " T.";
};
const strColor = s => {
  let h = 0;
  for (let i=0; i<s.length; i++) h = s.charCodeAt(i) + ((h<<5)-h);
  return `hsl(${Math.abs(h)%360},50%,40%)`;
};

function toast(msg, type="") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "show" + (type ? " "+type : "");
  setTimeout(() => { t.className = ""; }, 3000);
}

async function compressImage(file, maxBytes) {
  return new Promise(resolve => {
    const img = new Image(), url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const canvas = document.createElement("canvas");
      let {width: w, height: h} = img;
      const maxDim = 1200;
      if (w > maxDim || h > maxDim) { const s = Math.min(maxDim/w, maxDim/h); w=Math.round(w*s); h=Math.round(h*s); }
      const tryC = (w, h) => {
        canvas.width=w; canvas.height=h;
        canvas.getContext("2d").drawImage(img,0,0,w,h);
        let q=0.85, r;
        do { r = canvas.toDataURL("image/jpeg",q); q-=0.1; } while (r.length > maxBytes*1.37 && q>0.1);
        if (r.length > maxBytes*1.37 && w>200) return tryC(Math.round(w*.7),Math.round(h*.7));
        return r;
      };
      resolve(tryC(w,h));
    };
    img.onerror = () => { URL.revokeObjectURL(url); resolve(null); };
    img.src = url;
  });
}

async function getAvatar(username) {
  if (avatarCache[username] !== undefined) return avatarCache[username];
  try {
    const s = await get(ref(db, `accounts/${username}/avatar`));
    avatarCache[username] = s.exists() ? s.val() : null;
  } catch { avatarCache[username] = null; }
  return avatarCache[username];
}

function avHTML(username, img, size=40, fs=16) {
  if (img && img.startsWith("data:"))
    return `<img src="${img}" style="width:100%;height:100%;object-fit:cover;" alt="">`;
  const c = strColor(username);
  return `<span style="background:${c};width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:${fs}px;font-weight:700;color:#fff">${username[0]?.toUpperCase()||"?"}</span>`;
}

function setAv(el, username, img, size=40, fs=16) {
  el.style.background = strColor(username);
  el.innerHTML = avHTML(username, img, size, fs);
  el.style.width = size+"px"; el.style.height = size+"px";
}

// ── AUTH ──────────────────────────────────────────────────────────────────
window.doLogin = async function() {
  const u = document.getElementById("login-user").value.trim();
  const p = document.getElementById("login-pin").value;
  if (!u || p.length < 9) { toast("Bitte alle Felder ausfüllen.", "error"); return; }
  const btn = document.getElementById("login-btn");
  btn.textContent = "…"; btn.disabled = true;
  try {
    const snap = await get(ref(db, "accounts/"+u));
    if (!snap.exists() || snap.val().pin !== p) {
      toast("Falscher Nutzername oder PIN.", "error");
      btn.textContent = "Anmelden"; btn.disabled = false;
      return;
    }
    await signInAnonymously(auth);
    myUsername = u;
    localStorage.setItem("ov_user", u);
    await initApp();
  } catch(e) {
    toast("Fehler: "+e.message, "error");
    btn.textContent = "Anmelden"; btn.disabled = false;
  }
};

document.getElementById("login-pin").addEventListener("input", e => {
  let v = e.target.value.replace(/[^0-9]/g,"");
  if (v.length > 4) v = v.slice(0,4)+"-"+v.slice(4,8);
  e.target.value = v;
});
document.getElementById("login-pin").addEventListener("keydown", e => { if(e.key==="Enter") window.doLogin(); });
document.getElementById("login-user").addEventListener("blur", async function() {
  const u = this.value.trim(); if (!u) return;
  const s = await get(ref(db, `accounts/${u}/pinHint`));
  const el = document.getElementById("login-hint");
  if (s.exists() && s.val()) { el.textContent = "Hinweis: "+s.val(); el.style.display="block"; }
  else el.style.display = "none";
});

// ── AUTO-LOGIN ────────────────────────────────────────────────────────────
(async () => {
  const saved = localStorage.getItem("ov_user");
  if (saved) {
    const s = await get(ref(db, "accounts/"+saved));
    if (s.exists()) {
      myUsername = saved;
      await signInAnonymously(auth);
      await initApp();
    }
  }
})();

async function initApp() {
  myAvatar = await getAvatar(myUsername);
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display         = "flex";
  document.getElementById("mobile-nav").style.display  = "flex";

  setAv(document.getElementById("sidebar-av"), myUsername, myAvatar);

  document.getElementById("sidebar-handle").textContent = "@"+myUsername;

  // compose avatars
  setAv(document.getElementById("compose-av"), myUsername, myAvatar);
  setAv(document.getElementById("modal-av"), myUsername, myAvatar);
  setAv(document.getElementById("comments-my-av"), myUsername, myAvatar, 32, 13);

  loadFeed();
  loadTrending();
}

// ── FEED ──────────────────────────────────────────────────────────────────
function loadFeed() {
  const container = document.getElementById("feed-container");
  container.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div> Wird geladen…</div>';
  if (feedListener) { off(ref(db,"octoverse/posts")); feedListener=null; }
  onValue(ref(db,"octoverse/posts"), async snap => {
    if (!snap.exists()) {
      container.innerHTML = '<div class="empty-state"><h3>Noch keine Posts</h3><p>Sei der Erste!</p></div>';
      allPosts = [];
      return;
    }
    const data = snap.val();
    allPosts = Object.entries(data).sort((a,b) => b[1].timestamp - a[1].timestamp);
    await renderPosts(allPosts, container);
  });
}

async function renderPosts(posts, container) {
  container.innerHTML = "";
  for (const [id, post] of posts) {
    const el = await buildPostEl(id, post);
    container.appendChild(el);
  }
  if (!posts.length) container.innerHTML = '<div class="empty-state"><h3>Keine Posts</h3></div>';
}

        <span class="post-time">${timeAgo(post.timestamp)}</span>
      </div>
      ${post.text ? `<div class="post-text">${escHtml(post.text)}</div>` : ""}
      ${post.image ? `<div class="post-image"><img src="${post.image}" alt="" loading="lazy"></div>` : ""}
      <div class="post-actions">
        <button class="post-action comment" onclick="openComments('${id}');event.stopPropagation()">
          ${commentIcon} <span>${cmtCnt||""}</span>
        </button>
        <button class="post-action like ${liked?"liked":""}" id="like-btn-${id}"
          onclick="toggleLike('${id}');event.stopPropagation()">
          ${heartIcon} <span id="like-cnt-${id}">${likeCnt||""}</span>
        </button>
        <button class="post-action share-vc" onclick="openShareModal('${id}');event.stopPropagation()" title="Via VilloChat teilen">
          ${shareIcon} VilloChat
        </button>
        ${isOwn ? `<button class="delete-post-btn" onclick="deletePost('${id}');event.stopPropagation()" title="Löschen">${trashIcon}</button>` : ""}
      </div>
    </div>`;

  div.addEventListener("click", () => openComments(id));
  return div;
}

// ── LIKES ─────────────────────────────────────────────────────────────────
window.toggleLike = async function(postId) {
  const likeRef = ref(db, `octoverse/posts/${postId}/likes/${myUsername}`);
  const s = await get(likeRef);
  if (s.exists()) await remove(likeRef);
  else await set(likeRef, true);
  const cSnap = await get(ref(db, `octoverse/posts/${postId}/likes`));
  const cnt = cSnap.exists() ? Object.keys(cSnap.val()).length : 0;
  const btn = document.getElementById("like-btn-"+postId);
  const cntEl = document.getElementById("like-cnt-"+postId);
  if (cntEl) cntEl.textContent = cnt||"";
  if (btn) {
    const nowLiked = !s.exists();
    btn.className = "post-action like" + (nowLiked?" liked":"");
    btn.querySelector("svg").outerHTML; // force icon swap
    btn.innerHTML = `${nowLiked ? `<svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="currentColor"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>` : `<svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" ><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>`} <span id="like-cnt-${postId}">${cnt||""}</span>`;
  }
};

async function loadComments(postId) {
  const snap = await get(ref(db, `octoverse/posts/${postId}/comments`));
  const list = document.getElementById("comments-list");
  if (!snap.exists()) { list.innerHTML='<div class="empty-state" style="padding:20px">Noch keine Antworten.</div>'; return; }
  const sorted = Object.entries(snap.val()).sort((a,b) => a[1].timestamp - b[1].timestamp);
  list.innerHTML = "";
  for (const [, c] of sorted) {
    const av = await getAvatar(c.author);
    const d = document.createElement("div"); d.className="comment";
    d.innerHTML = `
      <div class="av" style="width:32px;height:32px;font-size:12px;background:${strColor(c.author)};flex-shrink:0;">
        ${avHTML(c.author, av, 32, 12)}
      </div>
      <div class="comment-body">
        <div class="comment-header"><strong>${escHtml(c.author)}</strong> · ${timeAgo(c.timestamp)}</div>
        <div class="comment-text">${escHtml(c.text)}</div>
      </div>`;
    list.appendChild(d);
  }
}

async function sendShare(contactName) {
  if (!currentSharePost) return;
  const postSnap = await get(ref(db, `octoverse/posts/${currentSharePost}`));
  if (!postSnap.exists()) return;
  const post = postSnap.val();
  const chatId = myUsername < contactName
    ? `${myUsername}_${contactName}`
    : `${contactName}_${myUsername}`;
  if (post.image) {
    await set(push(ref(db,`messages/${chatId}`)),
      {sender:myUsername, text:post.image, isImage:true, timestamp:Date.now(), read:false});
  }
  if (post.text) {
    await set(push(ref(db,`messages/${chatId}`)),
      {sender:myUsername, text:`🐙 @${post.author}: ${post.text}`, timestamp:Date.now()+(post.image?1:0), read:false});
  }
  closeShareModal();
  toast(`An @${contactName} gesendet!`);
}

  document.getElementById("share-modal").style.display="none"; currentSharePost=null;
};

// ── TRENDING ─────────────────────────────────────────────────────────────
async function loadTrending() {
  const words = {};
  allPosts.forEach(([,p]) => {
    if (!p.text) return;
    p.text.split(/\s+/).forEach(w => {
      if (w.startsWith("#") && w.length>1) words[w] = (words[w]||0)+1;
    });
  });
  const sorted = Object.entries(words).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const list = document.getElementById("trending-list");
  if (!sorted.length) { list.innerHTML='<div style="color:var(--text-secondary);font-size:14px">Keine Trends</div>'; return; }
  list.innerHTML = sorted.map(([tag,cnt],i) => `
    <div class="trend-item">
      <div class="trend-category">Trend #${i+1}</div>
      <div class="trend-name">${escHtml(tag)}</div>
      <div class="trend-count">${cnt} Posts</div>
    </div>`).join("");
}

// ── PIN FORMAT ────────────────────────────────────────────────────────────
function fmtPin(el) {
  let v = el.value.replace(/[^0-9]/g,"");
  if (v.length > 4) v = v.slice(0,4)+"-"+v.slice(4,8);
  el.value = v;
}
document.getElementById('reg-pin').addEventListener('input',  function(){ fmtPin(this); });
document.getElementById('reg-pin2').addEventListener('input', function(){ fmtPin(this); });

// ── USERNAME AVAILABILITY ─────────────────────────────────────────────────
let checkTimer = null;
window.checkUsernameAvail = function(val) {
  const el = document.getElementById('reg-user-status');
  const u = val.trim();
  if (!u) { el.textContent = ''; return; }
  if (!/^[a-zA-Z0-9_]{3,20}$/.test(u)) {
    el.textContent = '3-20 Zeichen, nur Buchstaben, Zahlen, _';
    el.className = 'err'; return;
  }
  el.textContent = 'Wird geprüft…'; el.className = '';
  clearTimeout(checkTimer);
  checkTimer = setTimeout(async () => {
    const snap = await get(ref(db, 'accounts/'+u));
    if (snap.exists()) { el.textContent = 'Name bereits vergeben'; el.className = 'err'; }
    else               { el.textContent = 'Name verfügbar';       el.className = 'ok';  }
  }, 500);
};

// ── REGISTER ──────────────────────────────────────────────────────────────
const ID_CHARS = "A7K19X3M8Q2R5T6V4WZYC";
function generateContactId() {
  const seg = () => Array.from({length:5}, () => ID_CHARS[Math.floor(Math.random()*ID_CHARS.length)]).join('');
  return `${seg()}-${seg()}-${seg()}-${ID_CHARS[Math.floor(Math.random()*ID_CHARS.length)]}`;
}

window.doRegister = async function() {
  const u     = document.getElementById('reg-user').value.trim();
  const p     = document.getElementById('reg-pin').value;
  const p2    = document.getElementById('reg-pin2').value;
  const hint  = document.getElementById('reg-hint').value.trim();
  const errEl = document.getElementById('reg-error');

  errEl.textContent = '';
  if (!u || p.length < 9) { errEl.textContent = 'Nutzername und PIN (xxxx-xxxx) erforderlich.'; return; }
  if (!/^[a-zA-Z0-9_]{3,20}$/.test(u)) { errEl.textContent = '3-20 Zeichen, nur Buchstaben, Zahlen und _.'; return; }
  if (p !== p2) { errEl.textContent = 'PINs stimmen nicht überein.'; return; }

  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = '…';

  try {
    const snap = await get(ref(db, 'accounts/'+u));
    if (snap.exists()) { errEl.textContent = 'Nutzername bereits vergeben.'; btn.disabled=false; btn.textContent='Konto erstellen'; return; }

    const newContactId = generateContactId();
    const accountData = { username: u, pin: p, id: u.toLowerCase(), contactId: newContactId };
    if (hint) accountData.pinHint = hint;
    await set(ref(db, 'accounts/'+u), accountData);

    // Auto-login after register
    await signInAnonymously(auth);
    myUsername = u;
    localStorage.setItem('ov_user', u);
    toast('Konto erstellt! Willkommen bei Octoverse.');
    await initApp();
  } catch(e) {
    errEl.textContent = 'Fehler: '+e.message;
    btn.disabled=false; btn.textContent='Konto erstellen';
  }
};
